<title>Promoção Revemar - Fácil de Aprovar</title>

<style>
    /* --- CONFIGURAÇÕES TEMA: FÁCIL DE APROVAR, FÁCIL DE LEVAR --- */
    :root {
        --honda-red: #e30613;
        --promo-yellow: #ffcc00;
        --promo-gold: #ffaa00;
        --dark-bg: #1a0000;
        --whatsapp-green: #25d366;
    }

    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        /* Fundo gradiente inspirado no panfleto da campanha */
        background: radial-gradient(circle at top, #ff4d4d 0%, #800000 50%, var(--dark-bg) 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .main-wrapper {
        width: 100%;
        max-width: 600px;
        position: relative;
        z-index: 1;
    }

    /* --- LOGO DA CAMPANHA --- */
    .logo-top {
        display: block;
        margin: 0 auto 20px auto;
        width: clamp(200px, 60vw, 320px);
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    /* --- ESTILO DOS CARDS --- */
    .card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        padding: clamp(20px, 5vw, 30px);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        margin-bottom: 25px;
        position: relative;
        border: 2px solid var(--promo-yellow);
    }

    /* Faixa superior temática */
    .card::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 8px;
        background: linear-gradient(90deg, var(--promo-yellow), var(--honda-red), var(--promo-yellow));
        border-radius: 20px 20px 0 0;
    }

    h2 {
        margin: 10px 0 20px;
        font-size: clamp(1.2rem, 5vw, 1.5rem);
        text-align: center;
        text-transform: uppercase;
        /* Texto em gradiente vermelho/escuro */
        background: linear-gradient(180deg, var(--honda-red), #800000);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .moto-name {
        font-weight: 800;
        font-size: clamp(1rem, 4vw, 1.3rem);
        margin-bottom: 25px;
        color: #fff;
        text-align: center;
        background: linear-gradient(90deg, #cc0000, var(--honda-red));
        padding: 12px 20px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(227, 6, 19, 0.4);
        text-transform: uppercase;
        border: 1px solid var(--promo-yellow);
    }

    /* --- FORMULÁRIO --- */
    label {
        font-weight: 700;
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #500;
        text-transform: uppercase;
    }

    input, select {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 2px solid #f0e0e0;
        margin-top: 6px;
        font-size: 16px;
        background: #fff;
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
        transition: 0.3s;
    }

    input:focus {
        border-color: var(--honda-red);
        outline: none;
        background: #fffcf0;
    }

    /* Bordas laterais seguindo o novo tema */
    input[name="nome"] { border-left: 6px solid var(--honda-red); }
    input[name="cpf"] { border-left: 6px solid var(--promo-yellow); }
    select[name="plano"] { border-left: 6px solid var(--honda-red); }
    input[name="parcelaIdeal"] { border-left: 6px solid var(--promo-yellow); }

    /* Botão WhatsApp - Grande e Chamativo */
    button {
        width: 100%;
        padding: 20px;
        background: linear-gradient(45deg, #1bd741, #25d366, #1bd741);
        background-size: 200% auto;
        border: none;
        margin-top: 25px;
        border-radius: 50px;
        font-size: 18px;
        font-weight: 900;
        color: white;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
    }

    /* --- CARROSSEL --- */
    .carousel {
        width: 100%;
        height: 240px;
        overflow: hidden;
        border-radius: 16px;
        background: #fff;
        border: 1px solid #eee;
    }

    .carousel-track {
        display: flex;
        width: max-content;
        animation: scroll 25s linear infinite;
    }

    .carousel-track img {
        height: 240px;
        width: auto;
        min-width: 300px;
        object-fit: contain;
        padding: 10px;
    }

    @keyframes scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

    /* Badge de "Revemar Motocenter" no rodapé */
    .footer-brand {
        text-align: center;
        color: white;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 600;
        opacity: 0.8;
    }
</style>
</head>
