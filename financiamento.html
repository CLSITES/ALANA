<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promoção CPF Aprovado - Revemar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
    /* --- SISTEMA DE CORES REVEMAR --- */
    :root {
        --honda-red: #cc0000;
        --honda-blue: #FF1A1A;
        --bg-dark: #FFD700;
        --gold-gradient: linear-gradient(135deg, #ffcc00 0%, #ffaa00 100%);
        --card-white: #ffffff;
        --whatsapp-green: #25d366;
    }

    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background-color: var(--bg-dark);
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(0, 51, 153, 0.4) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(0, 51, 153, 0.3) 0%, transparent 40%);
        background-attachment: fixed;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        min-height: 100vh;
    }

    .main-wrapper {
        width: 100%;
        max-width: 500px; /* Largura focada em Mobile High-End */
    }

    /* --- CABEÇALHO --- */
    .logo-container {
        text-align: center;
        margin-bottom: 30px;
        perspective: 1000px;
    }

    .logo-cpf {
        width: 180px;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotateX(0); }
        50% { transform: translateY(-10px) rotateX(5deg); }
    }

    /* --- CARDS ESTILO PREMIUM --- */
    .card {
        background: var(--card-white);
        border-radius: 28px;
        padding: 25px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        margin-bottom: 25px;
        border: 1px solid rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 8px;
        background: var(--gold-gradient);
    }

    h2 {
        font-weight: 900;
        font-size: 1.4rem;
        text-align: center;
        text-transform: uppercase;
        color: var(--honda-blue);
        margin-bottom: 20px;
        letter-spacing: -0.5px;
    }

    /* --- CARROSSEL --- */
    .carousel {
        width: 100%;
        height: 220px;
        overflow: hidden;
        border-radius: 18px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
    }

    .carousel-track img {
        height: 220px;
        width: auto;
        padding: 15px;
        object-fit: contain;
    }

    /* --- BADGE DA MOTO --- */
    .moto-badge {
        background: var(--honda-blue);
        color: white;
        text-align: center;
        padding: 12px;
        border-radius: 15px;
        font-weight: 800;
        font-size: 1.1rem;
        margin-top: -15px;
        margin-bottom: 20px;
        box-shadow: 0 8px 15px rgba(0, 51, 153, 0.2);
    }

    /* --- FORMULÁRIO --- */
    .input-group {
        margin-bottom: 18px;
    }

    label {
        font-weight: 700;
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        display: block;
        margin-left: 5px;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 15px;
        border-radius: 14px;
        border: 2px solid #f1f5f9;
        background: #f8fafc;
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        box-sizing: border-box;
        transition: all 0.3s;
    }

    input:focus {
        border-color: var(--honda-blue);
        background: white;
        outline: none;
        box-shadow: 0 0 0 4px rgba(0, 51, 153, 0.1);
    }

    /* --- BOTÃO WHATSAPP --- */
    button {
        width: 100%;
        padding: 20px;
        background: var(--whatsapp-green);
        color: white;
        border: none;
        border-radius: 18px;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
    }

    button:active { transform: scale(0.98); }

</style>
</head>
<body>

<div class="main-wrapper">
    <div class="logo-container">
        <img src="https://www.image2url.com/r2/default/images/1776105740628-4fed2248-a3cd-4d4a-b028-56829cbbf3e4.blob" alt="Revemar Honda" class="logo-cpf">
    </div>

    <div class="card">
        <h2 id="tituloMoto">Carregando...</h2>
        <div class="carousel">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>
    </div>

    <div class="card">
        <h2>Simulação Rápida</h2>
        <div class="moto-badge" id="motoEscolhida">Carregando...</div>

        <form id="finForm">
            <div class="input-group">
                <label>Nome Completo</label>
                <input name="nome" required placeholder="Seu nome">
            </div>

            <div class="input-group">
                <label>CPF</label>
                <input name="cpf" id="cpfInput" required placeholder="000.000.000-00">
            </div>

            <div class="input-group">
                <label>Data de Nascimento</label>
                <input name="nascimento" type="date" required>
            </div>

            <div class="input-group">
                <label>Celular (WhatsApp)</label>
                <input name="whatsapp" required placeholder="(94) 9 9999-9999">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Renda Mensal</label>
                    <input name="renda" type="number" required placeholder="R$ 2.000">
                </div>
                <div class="input-group">
                    <label>Habilitação?</label>
                    <select name="habilitacao" required>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>
            </div>

            <input type="hidden" name="moto" id="motoInput">
            <button type="submit">
                <span>CONSULTAR MEU CPF</span>
            </button>
        </form>
    </div>
</div>

<script>
// Mantive sua lógica original de dados e URL de WhatsApp para garantir o funcionamento
const motos = [
  { id:'POP110', nome:'POP 110i ES', img1:'https://www.honda.com.br/motos/sites/hda/files/2024-04/design-detalhes-laterais-da-pop-110i-es_0.webp', img2:'https://www.honda.com.br/motos/sites/hda/files/2024-04/Farol-Pop110iES_0.webp', img3:'https://www.honda.com.br/motos/sites/hda/files/2024-04/MODULO~1_0.jpg' },
  { id:'CG160FAN', nome:'CG 160 FAN', img1:'https://www.honda.com.br/motos/sites/hda/files/2025-08/visao-frontal-da-lateral-direita-da-honda-cg-160-fan.webp', img2:'https://www.honda.com.br/motos/sites/hda/files/2025-08/farol-da-moto-honda-cg-160-fan-.webp', img3:'https://www.honda.com.br/motos/sites/hda/files/2025-08/painel-da-moto-honda-cg-160-fan.webp' },
  { id:'BIZ125EX', nome:'BIZ 125 EX', img1:'https://www.honda.com.br/motos/sites/hda/files/2024-08/nova-carenagem-honda-biz-125-ex_1560x624.webp', img2:'https://www.honda.com.br/motos/sites/hda/files/2024-08/Biz_125_Diferencial_Freios_nas_duas_maos.webp', img3:'https://www.honda.com.br/motos/sites/hda/files/2024-08/luz-de-poscionamento-led-honda-biz-125-ex_2_1560x624.jpg' }
];

const params = new URLSearchParams(window.location.search);
const motoId = params.get("moto");
const motoSelecionada = motos.find(m => m.id === motoId) || motos[0];

document.getElementById("tituloMoto").innerText = motoSelecionada.nome;
document.getElementById("motoEscolhida").innerText = motoSelecionada.nome;
document.getElementById("motoInput").value = motoSelecionada.nome;

const imagensMoto = [motoSelecionada.img1, motoSelecionada.img2, motoSelecionada.img3];
const track = document.getElementById("carouselTrack");
track.innerHTML = [...imagensMoto, ...imagensMoto].map(src => `<img src="${src}">`).join("");

document.getElementById("finForm").addEventListener("submit", function(e){
    e.preventDefault();
    const fd = new FormData(this);
    const data = Object.fromEntries(fd.entries());
    const msg = `*SIMULAÇÃO SITE - REVEMAR*\n\n*Moto:* ${data.moto}\n*Nome:* ${data.nome}\n*CPF:* ${data.cpf}\n*Nascimento:* ${data.nascimento}\n*Renda:* R$ ${data.renda}\n*Habilitação:* ${data.habilitacao}`;
    window.location.href = `https://wa.me/5594991050728?text=${encodeURIComponent(msg)}`;
});
</script>

</body>
</html>
